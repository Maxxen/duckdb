name: V2 C API
on:
  push:
    branches: [main]
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Provision dev environment
        run: uv sync --group dev
      - name: Run pre-commit (default stages)
        run: uv run pre-commit run --all-files
      - name: Run pre-commit (manual stage)
        run: uv run pre-commit run --all-files --hook-stage manual
      - name: Verify generated header and stubs match spec
        run: git diff --exit-code

  build-and-test:
    runs-on: ubuntu-latest
    env:
      GEN: ninja
      CC: ccache gcc
      CXX: ccache g++
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build ccache
      - uses: ./.github/actions/ccache-action
      - name: Build
        run: make release
      - name: Test V2 CAPI
        run: ./build/release/test/unittest "[capi_v2]"
