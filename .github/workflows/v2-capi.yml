name: V2 C API
on:
  push:
    branches: [main]
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --hook-stage manual

  build-and-test:
    runs-on: ubuntu-latest
    env:
      GEN: ninja
      CC: ccache gcc
      CXX: ccache g++
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build ccache
      - uses: ./.github/actions/ccache-action
      - name: Build
        run: make release
      - name: Test V2 CAPI
        run: ./build/release/test/unittest "[capi_v2]"
      - name: Test JSON V2 extension
        run: ./build/release/test/unittest "test/sql/json_v2/*"
      - name: Test SQLite V2 extension
        run: ./build/release/test/unittest "test/sql/sqlite_v2/*"
