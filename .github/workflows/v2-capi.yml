name: V2 C API
on:
  push:
    branches: [main]
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install formatting tools
        run: pip3 install cmake-format 'black==24.*' 'clang_format==11.0.1'
      - name: Format check
        run: python3 scripts/format.py --all --check --silent

  build-and-test:
    runs-on: ubuntu-latest
    env:
      GEN: ninja
      CC: ccache gcc
      CXX: ccache g++
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install tools
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build ccache
      - uses: ./.github/actions/ccache-action
      - name: Build
        run: make release
      - name: Test V2 CAPI
        run: ./build/release/test/unittest "[capi_v2]"
      - name: Test JSON V2 extension
        run: ./build/release/test/unittest "test/sql/json_v2/*"
      - name: Test SQLite V2 extension
        run: ./build/release/test/unittest "test/sql/sqlite_v2/*"
