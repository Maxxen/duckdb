name: V2 C API
on:
  push:
    branches: [main]
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Provision dev environment
        run: uv sync --group dev
      - name: Run pre-commit (default stages)
        run: uv run pre-commit run --all-files
      - name: Run pre-commit (manual stage)
        run: uv run pre-commit run --all-files --hook-stage manual
      - name: Verify generated header and stubs match spec
        run: git diff --exit-code

  build-and-test:
    runs-on: ubuntu-latest
    env:
      GEN: ninja
      CC: ccache gcc
      CXX: ccache g++
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build ccache
      - uses: ./.github/actions/ccache-action
      - name: Build
        run: make release
      - name: Test V2 CAPI
        run: ./build/release/test/unittest "[capi_v2]"
      # The V2 *_option_set bridges delegate to PhysicalSet::ApplyVariable
      # (extracted from PhysicalSet::GetDataInternal so SQL `SET` and the
      # V2 C API share one path). These suites exercise that same path
      # from the SQL side and must stay green when ApplyVariable changes.
      - name: SQL SET regression — settings
        # operator_memory_limit.test is excluded: its GROUP BY OOM assertion
        # only triggers when the radix HT goes external, which requires
        # number_of_threads > 2. ubuntu-latest runners have 2 vCPUs, so the
        # HT stays in the GROW strategy and the query succeeds. Upstream CI
        # passes because duckdb/duckdb runs on 4+ vCPU Namespace.so runners.
        run: ./build/release/test/unittest "test/sql/settings/*" "exclude:test/sql/settings/operator_memory_limit.test"
      - name: SQL SET regression — duckdb_settings table function
        run: ./build/release/test/unittest "test/sql/table_function/duckdb_settings*"
      # V1 C API still uses DBConfig::SetOption directly; its regression
      # also covers the legacy paths the helper relies on.
      - name: V1 CAPI regression
        run: ./build/release/test/unittest "[capi]"
