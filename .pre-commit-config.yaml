repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
  - repo: local
    hooks:
      - id: duckdb-format
        name: duckdb format (staged changes)
        language: python
        entry: python3 scripts/format.py HEAD --fix --noconfirm --silent
        additional_dependencies:
          - cmake-format
          - black==24.*
          - cxxheaderparser
          - pcpp
          - clang_format==11.0.1
        pass_filenames: false
        always_run: true
      - id: ty
        name: ty (type check)
        entry: uvx ty check
        language: system
        pass_filenames: false
        types: [python]
