repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uvx ty check
        language: system
        pass_filenames: false
        types: [python]
