# yaml-language-server: $schema=../src/capigen/schema/metadata.schema.json
schema_version: "0.2.0"

versions:
  - "1.2.0"
  - "1.3.0"
  - "1.4.0"
  - "1.5.0"

suffixes:
  handles: "_ptr"
  callbacks: "_cb"
  aliases: "_t"

primitives:
  - name: opaque
    c_type: void
  - name: char
    c_type: char
  - name: bool
    c_type: bool
  - name: i8
    c_type: int8_t
  - name: i16
    c_type: int16_t
  - name: i32
    c_type: int32_t
  - name: i64
    c_type: int64_t
  - name: u8
    c_type: uint8_t
  - name: u16
    c_type: uint16_t
  - name: u32
    c_type: uint32_t
  - name: u64
    c_type: uint64_t
  - name: f32
    c_type: float
  - name: f64
    c_type: double
  - name: idx
    c_type: idx_t
