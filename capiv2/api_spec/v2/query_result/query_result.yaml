# yaml-language-server: $schema=../../../src/capigen/schema/module.schema.json
module: query_result

functions:
  duckdb_v2_query:
    summary: "Executes a SQL query and stores the materialized result."
    role: method
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      connection:
        type: duckdb_connection
        direction: in
        description: "The connection to perform the query in."
      query:
        type: char
        indirection: 1
        const: true
        direction: in
        description: "The SQL query to run."
      out_result:
        type: duckdb_result
        indirection: 1
        direction: out
        description: "The query result."
    return_type: DUCKDB_API_CALL

  duckdb_v2_destroy_result:
    summary: "Closes the result and de-allocates all memory."
    role: destructor
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        indirection: 1
        direction: in
        description: "The result to destroy."
    return_type: DUCKDB_API_CALL

  duckdb_v2_column_name:
    summary: "Returns the column name of the specified column."
    role: getter
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        direction: in
        description: "The result object to fetch the column name from."
      col:
        type: idx
        direction: in
        description: "The column index."
      out_name:
        type: char
        indirection: 2
        const: false
        direction: out
        description: "The column name of the specified column."
    return_type: DUCKDB_API_CALL

  duckdb_v2_column_type:
    summary: "Returns the column type of the specified column."
    role: getter
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        direction: in
        description: "The result object to fetch the column type from."
      col:
        type: idx
        direction: in
        description: "The column index."
      out_type:
        type: u32
        indirection: 1
        direction: out
        description: "The duckdb_type of the specified column."
    return_type: DUCKDB_API_CALL

  duckdb_v2_column_logical_type:
    summary: "Returns the logical column type of the specified column."
    role: getter
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        direction: in
        description: "The result object to fetch the column type from."
      col:
        type: idx
        direction: in
        description: "The column index."
      out_type:
        type: duckdb_logical_type
        indirection: 1
        direction: out
        description: "The logical column type. Must be destroyed with duckdb_v2_destroy_logical_type."
    return_type: DUCKDB_API_CALL

  duckdb_v2_column_count:
    summary: "Returns the number of columns present in the result."
    role: getter
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        direction: in
        description: "The result object."
      out_column_count:
        type: idx
        indirection: 1
        direction: out
        description: "The number of columns."
    return_type: DUCKDB_API_CALL

  duckdb_v2_rows_changed:
    summary: "Returns the number of rows changed by the query."
    role: getter
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        direction: in
        description: "The result object."
      out_rows_changed:
        type: idx
        indirection: 1
        direction: out
        description: "The number of rows changed."
    return_type: DUCKDB_API_CALL

  duckdb_v2_result_error:
    summary: "Returns the error message contained within the result."
    role: getter
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        direction: in
        description: "The result object to fetch the error from."
      out_error:
        type: char
        indirection: 2
        const: false
        direction: out
        description: "The error message, or nullptr if there is none."
    return_type: DUCKDB_API_CALL

  duckdb_v2_result_error_type:
    summary: "Returns the error type contained within the result."
    role: getter
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        direction: in
        description: "The result object to fetch the error type from."
      out_error_type:
        type: u32
        indirection: 1
        direction: out
        description: "The error type of the result."
    return_type: DUCKDB_API_CALL

  duckdb_v2_result_return_type:
    summary: "Returns the return type of the given result."
    role: getter
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        direction: in
        description: "The result object."
      out_return_type:
        type: u32
        indirection: 1
        direction: out
        description: "The return type."
    return_type: DUCKDB_API_CALL

  duckdb_v2_fetch_chunk:
    summary: "Fetches the next data chunk from a streaming result."
    role: getter
    belongs_to: duckdb_result
    parameters:
      context:
        type: duckdb_ctx
        direction: in
        description: "The context handle."
      result:
        type: duckdb_result
        direction: in
        description: "The result object to fetch the chunk from."
      out_chunk:
        type: duckdb_data_chunk
        indirection: 1
        direction: out
        description: "The resulting data chunk, or NULL when exhausted."
    return_type: DUCKDB_API_CALL
