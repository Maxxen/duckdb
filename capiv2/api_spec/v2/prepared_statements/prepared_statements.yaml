# yaml-language-server: $schema=../../../src/capigen/schema/module.schema.json
module: prepared_statements

functions:
  duckdb_v2_prepare:
    summary: "Create a prepared statement object from a query."
    role: constructor
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      connection:
        type: duckdb_v2_connection
        direction: in
        description: "The connection object."
      query:
        type: char
        indirection: 1
        const: true
        direction: in
        description: "The SQL query to prepare."
      out_prepared_statement:
        type: duckdb_v2_prepared_statement
        indirection: 1
        direction: out
        description: "The resulting prepared statement object."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_destroy_prepare:
    summary: "Closes the prepared statement and de-allocates all memory."
    role: destructor
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        indirection: 1
        direction: in
        description: "The prepared statement to destroy."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_prepare_error:
    summary: "Returns the error message associated with the prepared statement."
    role: getter
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement to obtain the error from."
      out_error:
        type: char
        indirection: 2
        const: false
        direction: out
        description: "The error message, or nullptr if there is none."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_nparams:
    summary: "Returns the number of parameters in the prepared statement."
    role: getter
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement."
      out_count:
        type: idx
        indirection: 1
        direction: out
        description: "The number of parameters."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_parameter_name:
    summary: "Returns the name used to identify the parameter."
    role: getter
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement."
      index:
        type: idx
        direction: in
        description: "The parameter index."
      out_name:
        type: char
        indirection: 2
        const: false
        direction: out
        description: "The parameter name. Must be freed with duckdb_free."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_param_type:
    summary: "Returns the parameter type for the parameter at the given index."
    role: getter
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement."
      param_idx:
        type: idx
        direction: in
        description: "The parameter index."
      out_type:
        type: u32
        indirection: 1
        direction: out
        description: "The parameter type."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_param_logical_type:
    summary: "Returns the logical type for the parameter at the given index."
    role: getter
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement."
      param_idx:
        type: idx
        direction: in
        description: "The parameter index."
      out_type:
        type: duckdb_v2_logical_type
        indirection: 1
        direction: out
        description: "The logical type. Must be destroyed with duckdb_destroy_logical_type."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_clear_bindings:
    summary: "Clear the params bound to the prepared statement."
    role: method
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_prepared_statement_type:
    summary: "Returns the statement type of the prepared statement."
    role: getter
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      stmt:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement."
      out_type:
        type: u32
        indirection: 1
        direction: out
        description: "The statement type."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_execute_prepared:
    summary: "Executes the prepared statement and returns a materialized query result."
    role: method
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement to execute."
      out_result:
        type: duckdb_v2_result
        indirection: 1
        direction: out
        description: "The query result."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_bind_value:
    summary: "Binds a value to the prepared statement at the specified index."
    role: method
    belongs_to: duckdb_v2_prepared_statement
    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement."
      param_idx:
        type: idx
        direction: in
        description: "The parameter index."
      val:
        type: duckdb_v2_value
        direction: in
        description: "The value to bind."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_bind_parameter_index:
    summary: "Retrieve the index of the parameter identified by name."
