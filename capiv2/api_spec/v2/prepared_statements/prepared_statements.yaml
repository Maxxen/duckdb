    parameters:
      context:
        type: duckdb_v2_ctx
        direction: in
        description: "The context handle."
      prepared_statement:
        type: duckdb_v2_prepared_statement
        direction: in
        description: "The prepared statement."
      name:
        type: char
        indirection: 1
        const: true
        direction: in
        description: "The parameter name."
      out_param_idx:
        type: idx
        indirection: 1
        direction: out
        description: "The parameter index."
    return_type: DUCKDB_V2_API_CALL

  duckdb_v2_bind_boolean:
