  append_hugeint:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Append a duckdb_hugeint value to the appender
    parameters:
      appender:
        type: appender
      value:
        type: hugeint
    return_type: state
    description: Append a duckdb_hugeint value to the appender.
  append_uint8:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Append a uint8_t value to the appender
    parameters:
      appender:
        type: appender
      value:
        type: u8
    return_type: state
    description: Append a uint8_t value to the appender.
  append_uint16:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Append a uint16_t value to the appender
    parameters:
      appender:
        type: appender
      value:
        type: u16
    return_type: state
    description: Append a uint16_t value to the appender.
  append_uint32:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Append a uint32_t value to the appender
    parameters:
      appender:
        type: appender
      value:
        type: u32
    return_type: state
    description: Append a uint32_t value to the appender.
  append_uint64:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Append a uint64_t value to the appender
    parameters:
