    return_type: state
    description: Append a blob value to the appender.
  append_null:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Append a NULL value to the appender (of any type)
    parameters:
      appender:
        type: appender
    return_type: state
    description: Append a NULL value to the appender (of any type).
  append_value:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Append a duckdb_value to the appender
    parameters:
      appender:
        type: appender
      value:
        type: value
    return_type: state
    description: Append a duckdb_value to the appender.
  append_data_chunk:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Appends a pre-filled data chunk to the specified appender.
    parameters:
      appender:
        type: appender
        description: The appender to append to.
      chunk:
        type: data_chunk
        description: The data chunk to append.
    return_type: state
    description: |-
      Appends a pre-filled data chunk to the specified appender.
       Attempts casting, if the data chunk types do not match the active appender types.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
  appender_error:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: '**DEPRECATION NOTICE**: This method is scheduled for removal in a future release.'
    parameters:
      appender:
        type: appender
        description: The appender to get the error from.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |-
      **DEPRECATION NOTICE**: This method is scheduled for removal in a future release.
      Use duckdb_appender_error_data instead.

      Returns the error message associated with the appender.
      If the appender has no error message, this returns `nullptr` instead.

      The error message should not be freed. It will be de-allocated when `duckdb_appender_destroy` is called.
    return_description: The error message, or `nullptr` if there is none.
