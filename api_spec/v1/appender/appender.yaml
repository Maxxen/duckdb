    summary: Append a varchar value to the appender
    parameters:
      appender:
        type: appender
      val:
        type: char
        indirection: 1
        const: true
    return_type: state
    description: Append a varchar value to the appender.
  append_varchar_length:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Append a varchar value to the appender
    parameters:
      appender:
        type: appender
      val:
        type: char
        indirection: 1
        const: true
      length:
