module: connection
functions:
  connect:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Opens a connection to a database.
    role: constructor
    belongs_to: connection
    parameters:
      database:
        type: database
        description: The database file to connect to.
      out_connection:
        type: connection
        indirection: 1
        kind: OUT
        description: The result connection object.
    return_type: state
    description: |-
      Opens a connection to a database. Connections are required to query the database, and store transactional state
      associated with the connection.
      The instantiated connection should be closed using 'duckdb_disconnect'.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
  interrupt:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Interrupt running query
    parameters:
      connection:
        type: connection
        description: The connection to interrupt
    return_type: opaque
    description: Interrupt running query
  query_progress:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Get the progress of the running query
    parameters:
      connection:
        type: connection
        description: The connection running the query.
    return_type: query_progress_type
    description: Get the progress of the running query.
    return_description: The query progress type containing progress information.
  disconnect:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Closes the specified connection and de-allocates all memory allocated for that connection
    role: destructor
    belongs_to: connection
    parameters:
      connection:
        type: connection
        indirection: 1
        description: The connection to close.
    return_type: opaque
    description: Closes the specified connection and de-allocates all memory allocated for that connection.
  connection_get_client_context:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Retrieves the client context of the connection
    parameters:
      connection:
        type: connection
        description: The connection.
      out_context:
        type: client_context
        indirection: 1
        kind: OUT
        description: The client context of the connection. Must be destroyed with `duckdb_destroy_client_context`.
    return_type: opaque
    description: Retrieves the client context of the connection.
  connection_get_arrow_options:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Retrieves the arrow options of the connection
    parameters:
      connection:
        type: connection
        description: The connection.
      out_arrow_options:
        type: arrow_options
        indirection: 1
        kind: OUT
    return_type: opaque
    description: Retrieves the arrow options of the connection.
  client_context_get_connection_id:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Returns the connection id of the client context
    parameters:
      context:
        type: client_context
        description: The client context.
    return_type: idx
    description: Returns the connection id of the client context.
    return_description: The connection id of the client context.
  destroy_client_context:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Destroys the client context and deallocates its memory
    role: destructor
    belongs_to: client_context
    parameters:
      context:
        type: client_context
        indirection: 1
        description: The client context to destroy.
    return_type: opaque
    description: Destroys the client context and deallocates its memory.
  destroy_arrow_options:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Destroys the arrow options and deallocates its memory
    role: destructor
    belongs_to: arrow_options
    parameters:
      arrow_options:
        type: arrow_options
        indirection: 1
        description: The arrow options to destroy.
    return_type: opaque
    description: Destroys the arrow options and deallocates its memory.
  get_table_names:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Get the list of (fully qualified) table names of the query
    parameters:
      connection:
        type: connection
        description: The connection for which to get the table names.
      query:
        type: char
        indirection: 1
        const: true
        description: The query for which to get the table names.
      qualified:
        type: bool
        description: Returns fully qualified table names (catalog.schema.table), if set to true, else only the (not escaped) table names.
    return_type: value
    description: Get the list of (fully qualified) table names of the query.
    return_description: A duckdb_value of type VARCHAR[] containing the (fully qualified) table names of the query. Must be destroyed with duckdb_destroy_value.
