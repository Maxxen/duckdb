module: file_system
functions:
  client_context_get_file_system:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Get a file system instance associated with the given client context
    parameters:
      context:
        type: client_context
        description: The client context.
    return_type: file_system
    description: Get a file system instance associated with the given client context.
    return_description: The resulting file system instance. Must be destroyed with `duckdb_destroy_file_system`.
  destroy_file_system:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Destroys the given file system instance
    role: destructor
    belongs_to: file_system
    parameters:
      file_system:
        type: file_system
        indirection: 1
        description: The file system instance to destroy.
    return_type: opaque
    description: Destroys the given file system instance.
  file_system_error_data:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Retrieves the last error that occurred on the given file system instance
    parameters:
      file_system:
        type: file_system
        description: The file system instance.
    return_type: error_data
    description: Retrieves the last error that occurred on the given file system instance.
    return_description: The error data.
  file_system_open:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Opens a file at the given path with the specified options
    parameters:
      file_system:
        type: file_system
        description: The file system instance.
      path:
        type: char
        indirection: 1
        const: true
        description: The path to the file.
      options:
        type: file_open_options
        description: The file open options specifying how to open the file.
      out_file:
        type: file_handle
        indirection: 1
        kind: OUT
        description: The resulting file handle instance, or `nullptr` if the open failed. Must be destroyed with `duckdb_destroy_file_handle`.
    return_type: state
    description: Opens a file at the given path with the specified options.
    return_description: Whether the operation was successful. If not, the error data can be retrieved using `duckdb_file_system_error_data`.
  create_file_open_options:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Creates a new file open options instance with blank settings
    role: constructor
    belongs_to: file_open_options
    parameters: {}
    return_type: file_open_options
    description: Creates a new file open options instance with blank settings.
    return_description: The new file open options instance. Must be destroyed with `duckdb_destroy_file_open_options`.
  file_open_options_set_flag:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Sets a specific flag in the file open options
    parameters:
      options:
        type: file_open_options
        description: The file open options instance.
      flag:
        type: file_flag
        description: The flag to set (e.g., read, write).
      value:
        type: bool
        description: If the flag is enabled or disabled.
    return_type: state
    description: Sets a specific flag in the file open options.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` if the flag is unrecognized or unsupported by this version of DuckDB.'
  destroy_file_open_options:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Destroys the given file open options instance
    role: destructor
    belongs_to: file_open_options
    parameters:
      options:
        type: file_open_options
        indirection: 1
        description: The file open options instance to destroy.
    return_type: opaque
    description: Destroys the given file open options instance.
  destroy_file_handle:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Destroys the given file handle and deallocates all associated resources.
    role: destructor
    belongs_to: file_handle
    parameters:
      file_handle:
        type: file_handle
        indirection: 1
        description: The file handle to destroy.
    return_type: opaque
    description: |-
      Destroys the given file handle and deallocates all associated resources.
      This will also close the file if it is still open.
  file_handle_error_data:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Retrieves the last error that occurred on the given file handle
    parameters:
      file_handle:
        type: file_handle
        description: The file handle.
    return_type: error_data
    description: Retrieves the last error that occurred on the given file handle.
    return_description: The error data. Must be destroyed with `duckdb_destroy_error_data`
  file_handle_read:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Reads data from the file into the buffer
    parameters:
      file_handle:
        type: file_handle
        description: The file handle to read from.
      buffer:
        type: opaque
        indirection: 1
        description: The buffer to read data into.
      size:
        type: i64
        description: The number of bytes to read.
    return_type: i64
    description: Reads data from the file into the buffer.
    return_description: The number of bytes actually read, or negative on error.
  file_handle_write:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Writes data from the buffer to the file
    parameters:
      file_handle:
        type: file_handle
        description: The file handle to write to.
      buffer:
        type: opaque
        indirection: 1
        const: true
        description: The buffer containing data to write.
      size:
        type: i64
        description: The number of bytes to write.
    return_type: i64
    description: Writes data from the buffer to the file.
    return_description: The number of bytes actually written, or negative on error.
  file_handle_tell:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Tells the current position in the file
    parameters:
      file_handle:
        type: file_handle
        description: The file handle to tell the position of.
    return_type: i64
    description: Tells the current position in the file.
    return_description: The current position in the file, or negative on error.
  file_handle_size:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Gets the size of the file
    parameters:
      file_handle:
        type: file_handle
        description: The file handle to get the size of.
    return_type: i64
    description: Gets the size of the file.
    return_description: The size of the file in bytes, or negative on error.
  file_handle_seek:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Seeks to a specific position in the file
    parameters:
      file_handle:
        type: file_handle
        description: The file handle to seek in.
      position:
        type: i64
    return_type: state
    description: Seeks to a specific position in the file.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure. If unsuccessful, the error data can be retrieved using `duckdb_file_handle_error_data`.'
  file_handle_sync:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Synchronizes the file's state with the underlying storage
    parameters:
      file_handle:
        type: file_handle
        description: The file handle to synchronize.
    return_type: state
    description: Synchronizes the file's state with the underlying storage.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure. If unsuccessful, the error data can be retrieved using `duckdb_file_handle_error_data`.'
  file_handle_close:
    status:
      - ["frozen", "v1.5.4", "2026-05-18"]
    summary: Closes the given file handle
    parameters:
      file_handle:
        type: file_handle
        description: The file handle to close.
    return_type: state
    description: Closes the given file handle.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure. If unsuccessful, the error data can be retrieved using `duckdb_file_handle_error_data`.'
