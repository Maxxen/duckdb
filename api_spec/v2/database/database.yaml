# yaml-language-server: $schema=https://raw.githubusercontent.com/duckdblabs/capiv2/main/src/capigen/schema/module.schema.json
module: database
functions:
  open:
    summary: "Opens a database under the environment."
    description: |
      `path` semantics:
        - `nullptr`, ":memory:", or any ":memory:..." path: opens a fresh
          in-memory database. In-memory databases are never deduplicated
          across calls.
        - any other path: opens the file as a database. Returns
          ERROR_RESOURCE_IN_USE if the file is already open
          under the same environment.

      `options` is an optional array of pre-created config option handles
      applied at construction time. The library reads name and setting
      from each handle; remaining fields are ignored. Options may include
      pre-open DBConfig settings (e.g. access_mode, memory_limit) and
      ATTACH-style storage options (e.g. BLOCK_SIZE, ENCRYPTION_KEY).
      Unknown names are accepted into DBConfig.unrecognized_options for
      later extension consumption. Pass `options=nullptr` and
      `option_count=0` to open with defaults.

      LOCAL_ONLY options are rejected at this scope (matches
      database_option_set).
    role: constructor
    belongs_to: database
    parameters:
      env:
        type: environment
        description: "The environment."
      path:
        type: char
        indirection: 1
        const: true
        description: "Path to the database. `nullptr` or any ':memory:...' path opens an in-memory database."
      options:
        type: option
        indirection: 1
        description: "Optional array of pre-created config option handles. May be `nullptr` if option_count is 0."
      option_count:
        type: idx
        description: "The number of entries in the options array."
      out_db:
        type: database
        indirection: 1
        kind: OUT
        description: "Receives the new database handle."
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: "Optional. On failure, receives an opaque info handle the caller must destroy via destroy_error_info."
    return_type: API_CALL
  close:
    summary: "Closes the database."
    description: |
      Always succeeds. The underlying database instance remains alive as
      long as any connection still holds a reference; when the last
      reference drops, the instance is destroyed and its path becomes
      available for reopen. On success, the handle is set to null.
    role: destructor
    belongs_to: database
    parameters:
      db:
        type: database
        indirection: 1
        description: "The database to close."
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: "Optional. On failure, receives an opaque info handle the caller must destroy via destroy_error_info."
    return_type: API_CALL
  database_option_set:
    summary: "Sets a config option on the database (GLOBAL scope)."
    description: |
      Reads name and setting from the option; other fields ignored.
      Equivalent to SQL `SET GLOBAL name = setting`. Returns
      ERROR_INVALID_INPUT if the option is declared LOCAL_ONLY,
      or for legacy options without a global setter (DUCKDB_LOCAL).
      Unknown names are accepted and stashed in
      DBConfig.unrecognized_options for later extension consumption
      (mirrors DBConfig::SetOptionByName).
    role: setter
    belongs_to: database
    parameters:
      db:
        type: database
        description: "The database."
      option:
        type: option
        description: "The config option to apply."
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: "Optional. On failure, receives an opaque info handle the caller must destroy via destroy_error_info."
    return_type: API_CALL
  database_option_get:
    summary: "Reads a config option from the database (GLOBAL scope) by name."
    description: |
      Allocates a fully-populated option (canonical name, current GLOBAL
      setting, default setting, description, target scope, aliases).
      Aliases resolve transparently — passing an alias returns the
      canonical option with the alias listed in its alias array. Unknown
      names return ERROR_INVALID_INPUT. Caller destroys the
      returned option.
    role: getter
    belongs_to: database
    parameters:
      db:
        type: database
        description: "The database."
      name:
        type: char
        indirection: 1
        const: true
        description: "Null-terminated option name (canonical or alias)."
      out_option:
        type: option
        indirection: 1
        kind: OUT
        description: "Receives the populated option handle."
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: "Optional. On failure, receives an opaque info handle the caller must destroy via destroy_error_info."
    return_type: API_CALL
  database_option_get_count:
    summary: "Returns the count of config options registered on the database."
    description: |
      Counts core options + extension options registered on the database.
      Aliases are NOT counted separately — each alias is reachable
      through its canonical option's alias array.
    role: getter
    belongs_to: database
    parameters:
      db:
        type: database
        description: "The database."
      out_count:
        type: idx
        indirection: 1
        kind: OUT
        description: "Receives the option count."
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: "Optional. On failure, receives an opaque info handle the caller must destroy via destroy_error_info."
    return_type: API_CALL
  database_option_get_by_index:
    summary: "Reads the config option at the given index from the database."
    description: |
      Index space: [0, core_count) addresses core options;
      [core_count, total) addresses extension options. Stable for the
      database while no extensions register new options. Out-of-range
      index returns ERROR_INVALID_INPUT. Caller destroys.
    role: getter
    belongs_to: database
    parameters:
      db:
        type: database
        description: "The database."
      index:
        type: idx
        description: "The option index, in [0, option_count)."
      out_option:
        type: option
        indirection: 1
        kind: OUT
        description: "Receives the populated option handle."
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: "Optional. On failure, receives an opaque info handle the caller must destroy via destroy_error_info."
    return_type: API_CALL
  library_version:
    summary: "Returns the version of the linked DuckDB library."
    role: getter
    parameters:
      out_version:
        type: char
        indirection: 2
        const: false
        kind: OUT
        description: "The version string."
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: "Optional. On failure, receives an opaque info handle the caller must destroy via destroy_error_info."
    return_type: API_CALL
