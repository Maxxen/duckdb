# yaml-language-server: $schema=https://raw.githubusercontent.com/duckdblabs/capiv2/main/src/capigen/schema/module.schema.json
module: database
functions:
  duckdb_v2_open:
    summary: "Creates a new database or opens an existing database file."
    role: constructor
    belongs_to: duckdb_v2_database
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      path:
        type: char
        indirection: 1
        const: true
        description: "Path to the database file on disk. Both nullptr and :memory: open an in-memory database."
      out_database:
        type: duckdb_v2_database
        indirection: 1
        kind: OUT
        description: "The result database object."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_open_ext:
    summary: "Extended version of duckdb_open with configuration support."
    role: constructor
    belongs_to: duckdb_v2_database
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      path:
        type: char
        indirection: 1
        const: true
        description: "Path to the database file on disk. Both nullptr and :memory: open an in-memory database."
      config:
        type: duckdb_v2_config
        description: "Optional configuration used to start up the database."
      out_database:
        type: duckdb_v2_database
        indirection: 1
        kind: OUT
        description: "The result database object."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_close:
    summary: "Closes the specified database and de-allocates all memory."
    role: destructor
    belongs_to: duckdb_v2_database
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      database:
        type: duckdb_v2_database
        indirection: 1
        description: "The database object to shut down."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_connect:
    summary: "Opens a connection to a database."
    role: constructor
    belongs_to: duckdb_v2_connection
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      database:
        type: duckdb_v2_database
        description: "The database file to connect to."
      out_connection:
        type: duckdb_v2_connection
        indirection: 1
        kind: OUT
        description: "The result connection object."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_disconnect:
    summary: "Closes the specified connection and de-allocates all memory."
    role: destructor
    belongs_to: duckdb_v2_connection
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      connection:
        type: duckdb_v2_connection
        indirection: 1
        description: "The connection to close."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_connection_get_client_context:
    summary: "Retrieves the client context of the connection."
    role: getter
    belongs_to: duckdb_v2_connection
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      connection:
        type: duckdb_v2_connection
        description: "The connection."
      out_context:
        type: duckdb_v2_client_context
        indirection: 1
        kind: OUT
        description: "The client context. Must be destroyed with duckdb_destroy_client_context."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_client_context_get_connection_id:
    summary: "Returns the connection id of the client context."
    role: getter
    belongs_to: duckdb_v2_client_context
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      client_context:
        type: duckdb_v2_client_context
        description: "The client context."
      out_connection_id:
        type: idx
        indirection: 1
        kind: OUT
        description: "The connection id."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_destroy_client_context:
    summary: "Destroys the client context and deallocates its memory."
    role: destructor
    belongs_to: duckdb_v2_client_context
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      client_context:
        type: duckdb_v2_client_context
        indirection: 1
        description: "The client context to destroy."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_create_instance_cache:
    summary: "Creates a new database instance cache."
    role: constructor
    belongs_to: duckdb_v2_instance_cache
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      out_instance_cache:
        type: duckdb_v2_instance_cache
        indirection: 1
        kind: OUT
        description: "The database instance cache."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_get_or_create_from_cache:
    summary: "Creates or retrieves a database instance from the cache."
    role: method
    belongs_to: duckdb_v2_instance_cache
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      instance_cache:
        type: duckdb_v2_instance_cache
        description: "The instance cache."
      path:
        type: char
        indirection: 1
        const: true
        description: "Path to the database file on disk."
      config:
        type: duckdb_v2_config
        description: "Optional configuration used to create the database."
      out_database:
        type: duckdb_v2_database
        indirection: 1
        kind: OUT
        description: "The resulting cached database."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_destroy_instance_cache:
    summary: "Destroys an existing database instance cache."
    role: destructor
    belongs_to: duckdb_v2_instance_cache
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      instance_cache:
        type: duckdb_v2_instance_cache
        indirection: 1
        description: "The instance cache to destroy."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_library_version:
    summary: "Returns the version of the linked DuckDB library."
    role: getter
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      out_version:
        type: char
        indirection: 2
        const: false
        kind: OUT
        description: "The version string."
    return_type: DUCKDB_V2_API_CALL
