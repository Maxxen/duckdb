# yaml-language-server: $schema=https://raw.githubusercontent.com/duckdblabs/capiv2/main/src/capigen/schema/module.schema.json
module: scalar
handles:
  duckdb_v2_scalar_function_builder:
    description: "An opaque handle to a scalar function builder. \nCreated with `duckdb_v2_scalar_function_builder_create`, configured with the various `duckdb_v2_scalar_function_set_*` functions, and registered with `duckdb_v2_scalar_function_register`. \nThe builder is owned by the caller and must be destroyed with `duckdb_v2_scalar_function_builder_destroy` when no longer needed.\n"
    cleanup_with: duckdb_v2_scalar_function_builder_destroy
  duckdb_v2_scalar_function_info:
    description: "An opaque handle to a scalar function callback context. \nThis is the type of the `info` parameter passed to scalar function callbacks (e.g. bind, state, and invoke callbacks). \nIt provides access to information about the function and its arguments, as well as functions for setting return types and retrieving user data. \nThe library owns this handle and guarantees its validity only for the duration of the callback invocation; Callees must not attempt to store or use it after the callback returns.\n"
callbacks:
  duckdb_v2_scalar_function_callback:
    return_type: void
    parameters:
      info:
        type: duckdb_v2_scalar_function_info
        description: "The callback's info handle, providing access to information about the function and its arguments, as well as functions for setting return types and retrieving user data. \nThe library owns this handle and guarantees its validity only for the duration of the callback invocation; Callees must not attempt to store or use it after the callback returns.\n"
      context:
        type: duckdb_v2_context
        description: The DuckDB context in which the callback is being invoked.
      err:
        type: duckdb_v2_error_info
        description: "Error info handle, provided by DuckDB. \nCan be used to signal failure and report error details if the callback encounters an error. \nOn success, leave `*err` unchanged. On failure, set an appropriate error code and message in `err` and return. DuckDB will inspect the error info after the callback returns to determine whether the call succeeded or failed.\nThe error info handle is owned by DuckDB, is always valid when the callback is invoked, and must not be stored or destroyed by the callee.\n"
functions:
  duckdb_v2_scalar_function_builder_create:
    summary: Creates a new scalar function.
    description: "Creates a new scalar function builder that can be configured with the various `duckdb_v2_scalar_function_set_*` functions and registered with `duckdb_v2_scalar_function_register`. \nOn success, returns a handle to the new builder. The builder is owned by the caller and must be destroyed with `duckdb_v2_scalar_function_builder_destroy` when no longer needed.\n"
    parameters:
      name:
        type: duckdb_v2_context
        description: The DuckDB context in which the function will be created.
      out:
        type: duckdb_v2_scalar_function_builder
        indirection: 1
        kind: OUT
        description: On success, receives the newly created scalar function builder. The caller owns the builder and must destroy it with `duckdb_v2_scalar_function_builder_destroy`.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_builder_set_name:
    summary: Sets the name of a scalar function.
    description: "The name of a scalar function must be a null-terminated string.\nThe library make and internal copy of the provided name and does not take ownership. \nFailing to set a name before registration results in an error.\n"
    parameters:
      func:
        type: duckdb_v2_scalar_function_builder
        description: The scalar function to configure
      name:
        type: char
        indirection: 1
        const: true
        description: The null-terminated name to set for the function.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_builder_set_bind_callback:
    summary: Sets the bind callback for a scalar function.
    description: "The \"Bind\" callback is invoked during query planning and can be used to perform type resolution, argument validation, and other setup tasks. \nAdditionally a \"Bind\" callback can set a \"bind data\" pointer which can be accessed by later callbacks (e.g. \"Init\" and \"Exec\") to share information between the planning and execution phases.\n"
    parameters:
      func:
        type: duckdb_v2_scalar_function_builder
        description: The scalar function to configure.
      callback:
        type: duckdb_v2_scalar_function_callback
        description: The bind callback to set for the function.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_builder_set_init_callback:
    summary: Sets the init callback for a scalar function.
    description: |
      The "Init" callback is invoked at the beginning of query execution for each worker thread that will execute the function.
      It can be used to setup an "init data" pointer which can be accessed by the "Exec" callback via `duckdb_v2_scalar_function_get_init_data` to keep worker-local mutable state across invocations of the function.
    parameters:
      func:
        type: duckdb_v2_scalar_function_builder
        description: The scalar function to configure.
      callback:
        type: duckdb_v2_scalar_function_callback
        description: The "init callback" to set for the function.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_builder_set_exec_callback:
    summary: Sets the "exec" callback for a scalar function.
    description: "The \"Exec\" callback is invoked during query execution to evaluate the function for each batch of input rows. \nThis is the main callback that implements the logic of the function. \nFailing to set an \"exec\" callback before registration results in an error.\n"
    parameters:
      func:
        type: duckdb_v2_scalar_function_builder
        description: The scalar function to configure.
      callback:
        type: duckdb_v2_scalar_function_callback
        description: The "exec" callback to set for the function. This is the callback that will be invoked to execute the function for each batch of input rows during query execution.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_builder_register:
    summary: Registers a scalar function with a database, making the function available for use in queries.
    description: "This function registers a fully configured scalar function builder with a database, making the function available for use in SQL queries executed on that database. \nThe function builder must have at least its name and exec callback set before registration; otherwise, registration will fail with an error.\nDuckDB makes an internal copy of the configured function and its properties during registration, so the caller retains ownership of the builder and can safely destroy or modify it after registration without affecting the registered function.\n"
    parameters:
      context:
        type: duckdb_v2_context
        description: The DuckDB context in which to register the function.
      func:
        type: duckdb_v2_scalar_function_builder
        description: The scalar function to register.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_builder_destroy:
    summary: Destroys a scalar function, releasing its resources.
    description: "This function destroys a scalar function builder that was created with `duckdb_v2_scalar_function_builder_create`, releasing any resources associated with it. \nIf the builder has already been registered with a database, destroying it does not affect the registered function in the database, as DuckDB makes an internal copy of the function during registration. \nThis function is null-safe: calling it with a null pointer is a no-op and returns DUCKDB_V2_ERROR_NONE.\nThe handle is set to null on return to prevent double-destruction.\n"
    parameters:
      func:
        type: duckdb_v2_scalar_function_builder
        indirection: 1
        description: The scalar function to destroy.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_builder_set_user_data:
    summary: Sets arbitrary extra data on a scalar function.
    description: "This function allows the caller to associate an opaque pointer to arbitrary user data with a scalar function. \nThis is useful for associating custom metadata or static context with the function that can be retrieved later from callbacks via `duckdb_v2_scalar_function_get_user_data`.\n"
    parameters:
      func:
        type: duckdb_v2_scalar_function_builder
        description: The scalar function to configure.
      data:
        type: void
        indirection: 1
        description: Opaque pointer to user data.
      destroy:
        type: duckdb_v2_user_data_destroy
        description: Optional. If provided, this callback will be used to destroy the user data when it's no longer needed. If not provided, the library will not attempt to destroy the user data.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  ## Callback Methods
  duckdb_v2_scalar_function_set_bind_data:
    summary: Sets the "bind data" pointer from a scalar function's "bind" callback.
    description: "This function can only be called from within a scalar function's \"bind\" callback. \nIt allows the callback to set an opaque pointer to arbitrary user data (\"bind data\") that will be associated with the function and accessible from later callbacks (e.g. \"init\" and \"exec\") via `duckdb_v2_scalar_function_get_bind_data`. \nThis is useful for sharing information between the planning and execution phases, such as resolved argument types, prepared statements, or other metadata computed during binding that needs to be available during execution.\n"
    parameters:
      args:
        type: duckdb_v2_scalar_function_info
        description: The callback info handle provided to the bind callback.
      data:
        type: void
        indirection: 1
        description: Opaque pointer to user data.
      copy:
        type: duckdb_v2_user_data_copy
        description: Optional. If provided, this callback will be used to make a copy of the "bind data" when needed. If not provided, the library will copy the pointer value as-is.
      equals:
        type: duckdb_v2_user_data_equals
        description: Optional. If provided, this callback will be used to compare two "bind data" pointers for equality. If not provided, the library will compare pointer values for equality.
      destroy:
        type: duckdb_v2_user_data_destroy
        description: Optional. If provided, this callback will be used to destroy the "bind data" when it's no longer needed. If not provided, the library will not attempt to destroy the bind data.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_get_bind_data:
    summary: Retrieves the user "bind data" pointer set by a scalar function's "bind" callback.
    description: "This function can be called from any scalar function callback (e.g. \"bind\", \"init\", or \"exec\") to retrieve the opaque pointer to user data (\"bind data\") that was set for the function by its \"bind\" callback via `duckdb_v2_scalar_function_set_bind_data`.\nIf the \"bind data\" has not been set, this function reports an error.\nThe \"bind data\" should be treated as immutable by later callbacks (e.g. \"init\" and \"exec\") as they may be invoked concurrently during query execution. \nIf mutability is needed, consider using `duckdb_v2_scalar_function_set_init_data` to set worker-local mutable state in the \"init\" callback instead.\n"
    parameters:
      args:
        type: duckdb_v2_scalar_function_info
        description: The callback info handle provided to a scalar function callback (e.g. the "bind", "init", or "exec" callback).
      out_data:
        type: opaque
        indirection: 2
        kind: OUT
        description: On success, receives the opaque pointer to user data that was set in the function's bind callback via `duckdb_v2_scalar_function_set_bind_data`.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_set_init_data:
    summary: Sets the "init data" pointer from a scalar function's "init" callback.
    description: |
      This function can only be called from within a scalar function's "init" callback.
      It allows the callback to set an opaque pointer to arbitrary user data ("init data") that will be associated with the executing worker thread for the duration of the query and accessible from the "exec" callback via `duckdb_v2_scalar_function_get_init_data`.
      Note that the "init data" is worker-local, not _thread local_. There is no guarantee that the same thread will see the same "init data" across multiple invocations of the function.
    parameters:
      args:
        type: duckdb_v2_scalar_function_info
        description: The callback info handle provided to the init callback.
      data:
        type: void
        indirection: 1
        description: Opaque pointer to the user provided "init data".
      destroy:
        type: duckdb_v2_user_data_destroy
        description: Optional. If provided, this callback will be used to destroy the "init data" when it's no longer needed. If not provided, the library will not attempt to destroy the init data.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_get_init_data:
    summary: Retrieves the user "init data" pointer set by a scalar function's "init" callback.
    description: |
      This function can be called from the "init" and "exec" callbacks of a scalar function to retrieve the opaque pointer to user data ("init data") that was set for the executing worker thread by its "init" callback via `duckdb_v2_scalar_function_set_init_data`.
      If the "init data" has not been set, this function reports an error.
    parameters:
      args:
        type: duckdb_v2_scalar_function_info
        description: The callback info handle provided to a scalar function callback (e.g. the "init", or "exec" callback).
      out_data:
        type: opaque
        indirection: 2
        kind: OUT
        description: On success, receives the opaque pointer to user data that was set in the function's "init" callback via `duckdb_v2_scalar_function_set_init_data`.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_scalar_function_get_user_data:
    summary: Retrieves the arbitrary user data pointer set on a scalar function.
    description: "This function retrieves the opaque pointer to arbitrary user data that was set for a scalar function via `duckdb_v2_scalar_function_builder_set_user_data`.\nThis function can be invoked from any scalar function callback (e.g. \"bind\", \"init\", or \"exec\"). \nDuckDB makes no guarantees about the mutability or thread-safety of the returned pointer; those guarantees are the responsibility of the caller when setting the user data.\n"
    parameters:
      func:
        type: duckdb_v2_scalar_function_info
        description: The callback info handle provided to a scalar function callback (e.g. the "bind", "init", or "exec" callback).
      out_data:
        type: opaque
        indirection: 2
        kind: OUT
        description: On success, receives the opaque pointer to user data that was set for the function via `duckdb_v2_scalar_function_builder_set_user_data`.
      err:
        type: duckdb_v2_error_info
        description: Optional. Error info handle to write details to if the call fails.
    return_type: DUCKDB_V2_API_CALL
