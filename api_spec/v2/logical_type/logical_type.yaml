# yaml-language-server: $schema=https://raw.githubusercontent.com/duckdblabs/capiv2/main/src/capigen/schema/module.schema.json
module: logical_type
#
# Read-side introspection of logical types. The construction surface is
# primitive-only (logical_type_create_from_id) until a real consumer (UDF
# API, extension-type registration) needs composite constructors; composite
# construction is not part of this surface yet.
#
# Mirrors duckdb::LogicalType and the kind-specific accessors it exposes
# internally (decimal width/scale, enum dictionary, list/array/struct/map/
# union children).
#
# Borrowed pointers returned by *_get_alias, *_get_enum_value,
# *_get_struct_child_name, *_get_union_member_name are valid until the
# owning logical_type handle is destroyed. Logical types returned by
# *_get_list_child_type / *_get_struct_child_type / etc. are owned by the
# caller and must be destroyed.
#
# The LOGICAL_TYPE_ID enum values mirror duckdb::LogicalTypeId
# integer values exactly, so the numeric round-trip matches what's stored
# internally.

enums:
  LOGICAL_TYPE_ID:
    description: |
      Logical type identifier. Mirrors duckdb::LogicalTypeId. Values are
      kept numerically identical to the internal enum so round-tripping is
      lossless. Bind/UDF-only ids (UNKNOWN, ANY, TEMPLATE) appear here for
      completeness; they don't show up in result column types in practice.
    values:
      LOGICAL_TYPE_ID_INVALID:
        value: 0
        description: Invalid / unset.
      LOGICAL_TYPE_ID_SQLNULL:
        value: 1
        description: NULL constant type.
      LOGICAL_TYPE_ID_UNKNOWN:
        value: 2
        description: Unknown — used for unresolved parameter expressions.
      LOGICAL_TYPE_ID_ANY:
        value: 3
        description: ANY — used for functions that accept any type.
      LOGICAL_TYPE_ID_BOOLEAN:
        value: 10
      LOGICAL_TYPE_ID_TINYINT:
        value: 11
      LOGICAL_TYPE_ID_SMALLINT:
        value: 12
      LOGICAL_TYPE_ID_INTEGER:
        value: 13
      LOGICAL_TYPE_ID_BIGINT:
        value: 14
      LOGICAL_TYPE_ID_DATE:
        value: 15
        description: 32-bit days since epoch.
      LOGICAL_TYPE_ID_TIME:
        value: 16
        description: 64-bit microseconds since midnight.
      LOGICAL_TYPE_ID_TIMESTAMP_SEC:
        value: 17
        description: 64-bit seconds since epoch.
      LOGICAL_TYPE_ID_TIMESTAMP_MS:
        value: 18
        description: 64-bit milliseconds since epoch.
      LOGICAL_TYPE_ID_TIMESTAMP:
        value: 19
        description: 64-bit microseconds since epoch.
      LOGICAL_TYPE_ID_TIMESTAMP_NS:
        value: 20
        description: 64-bit nanoseconds since epoch.
      LOGICAL_TYPE_ID_DECIMAL:
        value: 21
        description: Decimal with width and scale parameters.
      LOGICAL_TYPE_ID_FLOAT:
        value: 22
      LOGICAL_TYPE_ID_DOUBLE:
        value: 23
      LOGICAL_TYPE_ID_VARCHAR:
        value: 25
      LOGICAL_TYPE_ID_BLOB:
        value: 26
      LOGICAL_TYPE_ID_INTERVAL:
        value: 27
      LOGICAL_TYPE_ID_UTINYINT:
        value: 28
      LOGICAL_TYPE_ID_USMALLINT:
        value: 29
      LOGICAL_TYPE_ID_UINTEGER:
        value: 30
      LOGICAL_TYPE_ID_UBIGINT:
        value: 31
      LOGICAL_TYPE_ID_TIMESTAMP_TZ:
        value: 32
        description: 64-bit microseconds since epoch, timezone-aware.
      LOGICAL_TYPE_ID_TIMESTAMP_TZ_NS:
        value: 33
        description: 64-bit nanoseconds since epoch, timezone-aware.
      LOGICAL_TYPE_ID_TIME_TZ:
        value: 34
        description: 64-bit microseconds since midnight + 32-bit offset.
      LOGICAL_TYPE_ID_TIME_NS:
        value: 35
        description: 64-bit nanoseconds since midnight.
      LOGICAL_TYPE_ID_BIT:
        value: 36
      LOGICAL_TYPE_ID_BIGNUM:
        value: 39
        description: Arbitrary-precision integer (VARINT-encoded).
      LOGICAL_TYPE_ID_UHUGEINT:
        value: 49
      LOGICAL_TYPE_ID_HUGEINT:
        value: 50
      LOGICAL_TYPE_ID_UUID:
        value: 54
      LOGICAL_TYPE_ID_GEOMETRY:
        value: 60
        description: Geometry (spatial extension).
      LOGICAL_TYPE_ID_STRUCT:
        value: 100
      LOGICAL_TYPE_ID_LIST:
        value: 101
      LOGICAL_TYPE_ID_MAP:
        value: 102
      LOGICAL_TYPE_ID_ENUM:
        value: 104
      LOGICAL_TYPE_ID_UNION:
        value: 107
      LOGICAL_TYPE_ID_ARRAY:
        value: 108
      LOGICAL_TYPE_ID_VARIANT:
        value: 109
functions:
  # -----------------------------------------------------------------------
  # Lifecycle
  # -----------------------------------------------------------------------
  logical_type_create_from_id:
    summary: Creates a logical type from a primitive type id.
    description: |
      Only primitive type ids (no kind-specific parameters) are accepted:
      BOOLEAN, TINYINT..BIGINT, UTINYINT..UBIGINT, HUGEINT, UHUGEINT,
      FLOAT, DOUBLE, DATE, all TIME and TIMESTAMP variants, INTERVAL,
      VARCHAR, BLOB, BIT, BIGNUM, UUID.

      Returns ERROR_INVALID_INPUT for parameterised type ids
      (DECIMAL, LIST, STRUCT, MAP, ARRAY, UNION, ENUM, VARIANT, GEOMETRY),
      for bind-time-only ids (SQLNULL, ANY, UNKNOWN), and for INVALID.
      Composite construction is not part of this surface yet.
    role: constructor
    belongs_to: logical_type
    parameters:
      type_id:
        type: LOGICAL_TYPE_ID
        description: The primitive type id to instantiate.
      out_type:
        type: logical_type
        indirection: 1
        kind: OUT
        description: Receives the new logical type handle.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_destroy:
    summary: Destroys a logical type handle.
    description: |
      Null-safe: passing nullptr or a slot already set to nullptr is a
      no-op. On success the slot is set to nullptr.
    role: destructor
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
        indirection: 1
        description: The logical type to destroy.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  # -----------------------------------------------------------------------
  # Common introspection
  # -----------------------------------------------------------------------
  logical_type_get_id:
    summary: Returns the logical type id.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
        description: The logical type.
      out_id:
        type: LOGICAL_TYPE_ID
        indirection: 1
        kind: OUT
        description: Receives the type id.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_alias:
    summary: Borrows the logical type's alias (extension/user-defined name) if any.
    description: |
      On success, writes a borrowed null-terminated string into *out_alias
      if the type has a non-empty alias, or NULL if the type has no alias
      (or only an empty alias). For spatial types the alias is e.g.
      "POINT_2D"; for arbitrary user-defined types it is the configured
      name. A non-NULL pointer is valid until the logical type is destroyed.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
        description: The logical type.
      out_alias:
        type: char
        indirection: 2
        const: true
        kind: OUT_BORROW
        description: Borrowed pointer to the alias string, or NULL if the type has no alias (or only an empty alias).
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  # -----------------------------------------------------------------------
  # DECIMAL
  # -----------------------------------------------------------------------
  logical_type_get_decimal_width:
    summary: Returns the width of a DECIMAL logical type.
    description: Returns ERROR_INVALID_INPUT if the type id is not DECIMAL.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_width:
        type: u8
        indirection: 1
        kind: OUT
        description: Receives the decimal width.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_decimal_scale:
    summary: Returns the scale of a DECIMAL logical type.
    description: Returns ERROR_INVALID_INPUT if the type id is not DECIMAL.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_scale:
        type: u8
        indirection: 1
        kind: OUT
        description: Receives the decimal scale.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_decimal_internal_type_id:
    summary: Returns the internal storage type id for a DECIMAL.
    description: |
      Returns one of SMALLINT, INTEGER, BIGINT, or HUGEINT, depending on
      the decimal's width. Used by callers to pick the right typed
      accessor for DECIMAL storage.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_id:
        type: LOGICAL_TYPE_ID
        indirection: 1
        kind: OUT
        description: Receives the internal storage type id.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  # -----------------------------------------------------------------------
  # ENUM
  # -----------------------------------------------------------------------
  logical_type_get_enum_size:
    summary: Returns the dictionary entry count of an ENUM logical type.
    description: |
      The size is the entry count (cardinality of the dictionary), not a
      byte size. It is returned as idx_t for ABI uniformity, but the
      effective cap is UINT32_MAX (2^32 - 1) entries: the largest physical
      index type used by ENUM storage is UINTEGER. Returns
      ERROR_INVALID_INPUT if the type id is not ENUM.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_size:
        type: idx
        indirection: 1
        kind: OUT
        description: Receives the number of entries in the enum dictionary.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_enum_value:
    summary: Borrows the dictionary value at the given index of an ENUM.
    description: |
      Out-of-range index returns ERROR_INVALID_INPUT. The
      returned pointer + length describe a borrowed null-terminated byte
      string valid until the logical type is destroyed. Bytes are not
      validated as UTF-8 — VARCHAR storage holds whatever bytes were
      inserted.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      index:
        type: idx
        description: The dictionary index, in [0, enum_size).
      out_value:
        type: char
        indirection: 2
        const: true
        kind: OUT_BORROW
        description: Borrowed pointer to the dictionary string.
      out_length:
        type: idx
        indirection: 1
        kind: OUT
        description: Receives the length in bytes of the dictionary string.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_enum_internal_type_id:
    summary: Returns the internal index type id for an ENUM.
    description: |
      Returns UTINYINT (dict <= 255), USMALLINT (dict <= 65535), or
      UINTEGER (larger), matching the physical storage width.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_id:
        type: LOGICAL_TYPE_ID
        indirection: 1
        kind: OUT
        description: Receives the internal index type id.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  # -----------------------------------------------------------------------
  # LIST / ARRAY
  # -----------------------------------------------------------------------
  logical_type_get_list_child_type:
    summary: Returns the child logical type of a LIST.
    description: |
      The returned logical type is caller-owned and must be destroyed via
      logical_type_destroy. Returns ERROR_INVALID_INPUT
      if the input type id is not LIST.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_child:
        type: logical_type
        indirection: 1
        kind: OUT
        description: Receives the owned child logical type.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_array_child_type:
    summary: Returns the child logical type of a fixed-size ARRAY.
    description: |
      The returned logical type is caller-owned and must be destroyed.
      Returns ERROR_INVALID_INPUT if the input is not ARRAY.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_child:
        type: logical_type
        indirection: 1
        kind: OUT
        description: Receives the owned child logical type.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_array_size:
    summary: Returns the fixed size of an ARRAY logical type.
    description: Returns ERROR_INVALID_INPUT if the input is not ARRAY.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_size:
        type: idx
        indirection: 1
        kind: OUT
        description: Receives the array size.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  # -----------------------------------------------------------------------
  # MAP
  # -----------------------------------------------------------------------
  logical_type_get_map_key_type:
    summary: Returns the key logical type of a MAP.
    description: Owned by the caller. INVALID_INPUT if the input is not MAP.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_key:
        type: logical_type
        indirection: 1
        kind: OUT
        description: Receives the owned key logical type.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_map_value_type:
    summary: Returns the value logical type of a MAP.
    description: Owned by the caller. INVALID_INPUT if the input is not MAP.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_value:
        type: logical_type
        indirection: 1
        kind: OUT
        description: Receives the owned value logical type.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  # -----------------------------------------------------------------------
  # STRUCT
  # -----------------------------------------------------------------------
  logical_type_get_struct_child_count:
    summary: Returns the number of fields in a STRUCT logical type.
    description: Returns ERROR_INVALID_INPUT if the input is not STRUCT.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_count:
        type: idx
        indirection: 1
        kind: OUT
        description: Receives the number of struct fields.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_struct_child_name:
    summary: Borrows the field name at the given index of a STRUCT.
    description: |
      The returned pointer + length describe a borrowed null-terminated
      name valid until the logical type is destroyed. Out-of-range index
      returns ERROR_INVALID_INPUT.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      index:
        type: idx
        description: The field index, in [0, struct_child_count).
      out_name:
        type: char
        indirection: 2
        const: true
        kind: OUT_BORROW
        description: Borrowed pointer to the field name.
      out_length:
        type: idx
        indirection: 1
        kind: OUT
        description: Receives the byte length of the field name.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_struct_child_type:
    summary: Returns the field logical type at the given index of a STRUCT.
    description: |
      The returned logical type is caller-owned. Out-of-range index returns
      ERROR_INVALID_INPUT.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      index:
        type: idx
        description: The field index, in [0, struct_child_count).
      out_child:
        type: logical_type
        indirection: 1
        kind: OUT
        description: Receives the owned field logical type.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  # -----------------------------------------------------------------------
  # UNION
  # -----------------------------------------------------------------------
  logical_type_get_union_member_count:
    summary: Returns the number of members in a UNION logical type.
    description: Returns ERROR_INVALID_INPUT if the input is not UNION.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      out_count:
        type: idx
        indirection: 1
        kind: OUT
        description: Receives the number of union members.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_union_member_name:
    summary: Borrows the member name at the given index of a UNION.
    description: |
      The returned pointer + length describe a borrowed null-terminated
      name valid until the logical type is destroyed. Out-of-range index
      returns ERROR_INVALID_INPUT.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      index:
        type: idx
        description: The member index, in [0, union_member_count).
      out_name:
        type: char
        indirection: 2
        const: true
        kind: OUT_BORROW
        description: Borrowed pointer to the member name.
      out_length:
        type: idx
        indirection: 1
        kind: OUT
        description: Receives the byte length of the member name.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
  logical_type_get_union_member_type:
    summary: Returns the member logical type at the given index of a UNION.
    description: |
      The returned logical type is caller-owned. Out-of-range index returns
      ERROR_INVALID_INPUT.
    role: getter
    belongs_to: logical_type
    parameters:
      type:
        type: logical_type
      index:
        type: idx
        description: The member index, in [0, union_member_count).
      out_child:
        type: logical_type
        indirection: 1
        kind: OUT
        description: Receives the owned member logical type.
      err:
        type: error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via error_info_destroy.
    return_type: API_CALL
