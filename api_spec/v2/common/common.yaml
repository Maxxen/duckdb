# yaml-language-server: $schema=https://raw.githubusercontent.com/duckdblabs/capiv2/main/src/capigen/schema/module.schema.json
module: common
handles:
  duckdb_v2_environment:
    description: |
      An opaque handle to the V2 environment: the required root through
      which databases are opened. Holds the shared DBInstanceCache so
      that file-level conflicts (the same database file opened twice)
      are detected across all databases under the same environment.
      Destroying the environment refuses with
      DUCKDB_V2_ERROR_RESOURCE_IN_USE while any database opened through
      it is still alive — close those first.
    cleanup_with: duckdb_v2_destroy_environment
  duckdb_v2_database:
    description: An opaque handle to a DuckDB database instance
  duckdb_v2_connection:
    description: An opaque handle to a DuckDB connection
  duckdb_v2_option:
    description: |
      An opaque, owned handle to a single config option: name + setting,
      plus optional metadata (description, default setting, target scope,
      aliases). Created via duckdb_v2_option_create with a name and
      setting; created by the library with full metadata when returned
      from a database/connection get. Always destroyed by the caller via
      duckdb_v2_option_destroy. All accessors return values valid until
      destroy.
    cleanup_with: duckdb_v2_option_destroy
  # Error reporting. Every fallible function takes a trailing
  # `duckdb_v2_error_info_ptr *err` out-parameter.
  #
  # Contract:
  #   - The return value always carries the error code and is authoritative.
  #   - `err` is optional: callers may pass nullptr to opt out of detail.
  #   - If the call succeeds, `*err` is left as nullptr.
  #   - If the call fails and `err != nullptr`, the library allocates an
  #     info handle and stores its pointer in `*err`. The caller owns it
  #     and must destroy it with duckdb_v2_destroy_error_info.
  #   - If `*err` is already non-null on entry, the library destroys the
  #     previous info before writing. To preserve info across calls, detach
  #     it first: `saved = *err; *err = nullptr;`.
  duckdb_v2_error_info:
    description: Opaque detail for a failed call; destroy with duckdb_v2_destroy_error_info.
    cleanup_with: duckdb_v2_destroy_error_info

  duckdb_v2_context:
    description: TODO

callbacks:
  duckdb_v2_user_data_equals:
    return_type: bool
    parameters:
      a:
        type: void
        indirection: 1
        description: |
          Opaque pointer to the first resource. The library passes this pointer
          to the equality function when it needs to compare two resources for
          equality.
      b:
        type: void
        indirection: 1
        description: |
          Opaque pointer to the second resource. The library passes this pointer
          to the equality function when it needs to compare two resources for
          equality.

  duckdb_v2_user_data_copy:
    return_type: opaque
    return_pointer: 1
    parameters:
      data:
        type: void
        indirection: 1
        description: | 
            Opaque pointer to the resource to copy. The library passes this pointer
            to the copy function when it needs to make a copy of the resource.
            The copy function is responsible for allocating a new copy and returning
            its pointer; the library will eventually destroy it with the destructor.

  duckdb_v2_user_data_destroy:
    return_type: void
    parameters:
      data:
        type: void
        indirection: 1
        description: | 
          Opaque pointer to the resource to destroy. The library passes this
          pointer to the destructor when it's time to clean up the resource.
          The destructor is responsible for freeing it.
aliases:
  duckdb_v2_error_kind:
    underlying: u32
    description: The category part of an error code (the upper 16 bits)
  duckdb_v2_error_code:
    underlying: u32
    description: 'Full 32-bit error code: (group_id << 16) | code'
  DUCKDB_V2_API_CALL:
    underlying: duckdb_v2_error_code
