# yaml-language-server: $schema=https://raw.githubusercontent.com/duckdblabs/capiv2/main/src/capigen/schema/module.schema.json
module: errors
# Error codes are 32-bit integers: (group_id << 16) | code
error_groups:
  None:
    group_id: 0x0000
    entries:
      ERROR_NONE:
        code: 0x0000
        description: "Success"
  IO:
    group_id: 0x0001
    description: "Input/Output and File System errors"
    entries:
      ERROR_IO_FILE_NOT_FOUND:
        code: 0x0001
        description: "The specified file could not be found"
      ERROR_IO_READ_FAILURE:
        code: 0x0002
        description: "Failed to read from the storage device"
      ERROR_EOF:
        code: 0x0003
        description: "Unexpected end of file reached"
      ERROR_IO_GENERAL:
        code: 0x0004
        description: "A generic I/O error occurred while reading or writing data"
      ERROR_IO_NETWORK:
        code: 0x0005
        description: "A network-level failure occurred during an I/O operation"
      ERROR_IO_HTTP:
        code: 0x0006
        description: "An HTTP request issued by the database failed"
  Invalid Input:
    group_id: 0x0002
    description: "Errors related to user-provided data or parameters"
    entries:
      ERROR_INVALID_INPUT:
        code: 0x0002
        description: "General invalid input error"
      ERROR_INVALID_PARAMETER:
        code: 0x0003
        description: "A specific function parameter is malformed"
      ERROR_OUT_OF_RANGE:
        code: 0x0004
        description: "A provided value is outside the acceptable range"
      ERROR_OBJECT_SIZE:
        code: 0x0005
        description: "An object exceeded its maximum permitted size"
  Resource:
    group_id: 0x0003
    description: "Errors related to resource availability and lifecycle"
    entries:
      ERROR_RESOURCE_IN_USE:
        code: 0x0001
        description: "The requested resource is already in use (e.g. the database file is already open under this environment, or the environment still has open databases)"
      ERROR_RESOURCE_OUT_OF_MEMORY:
        code: 0x0002
        description: "An allocation failed because the system ran out of memory"
      ERROR_RESOURCE_CONNECTION:
        code: 0x0003
        description: "A connection-level failure occurred (e.g. the connection has been closed or invalidated)"
      ERROR_RESOURCE_DEPENDENCY:
        code: 0x0004
        description: "An operation failed because of an unresolved dependency between catalog objects"
      ERROR_RESOURCE_MISSING_EXTENSION:
        code: 0x0005
        description: "An extension required by the operation is not loaded"
      ERROR_RESOURCE_AUTOLOAD:
        code: 0x0006
        description: "Autoloading an extension failed"
  Type:
    group_id: 0x0004
    description: "Errors related to value types, conversions, and arithmetic"
    entries:
      ERROR_TYPE_CONVERSION:
        code: 0x0001
        description: "A value could not be converted to the requested type"
      ERROR_TYPE_UNKNOWN:
        code: 0x0002
        description: "An unknown or unsupported type was encountered"
      ERROR_TYPE_INVALID:
        code: 0x0003
        description: "A type was used in a context where it is not valid"
      ERROR_TYPE_MISMATCH:
        code: 0x0004
        description: "Two values or expressions have incompatible types"
      ERROR_TYPE_DECIMAL:
        code: 0x0005
        description: "A decimal value is out of range or otherwise invalid"
      ERROR_TYPE_DIVIDE_BY_ZERO:
        code: 0x0006
        description: "Division by zero was attempted"
  Query:
    group_id: 0x0005
    description: "Errors raised during query parsing, planning, and execution"
    entries:
      ERROR_QUERY_PARSER:
        code: 0x0001
        description: "The query could not be parsed"
      ERROR_QUERY_SYNTAX:
        code: 0x0002
        description: "The query contains a syntax error"
      ERROR_QUERY_BINDER:
        code: 0x0003
        description: "Binding the query against the catalog failed (e.g. unknown column or table)"
      ERROR_QUERY_PLANNER:
        code: 0x0004
        description: "The query could not be translated into a logical plan"
      ERROR_QUERY_OPTIMIZER:
        code: 0x0005
        description: "An error occurred during query optimization"
      ERROR_QUERY_EXPRESSION:
        code: 0x0006
        description: "An expression in the query is invalid or could not be evaluated"
      ERROR_QUERY_EXECUTOR:
        code: 0x0007
        description: "An error occurred while executing the physical plan"
      ERROR_QUERY_SCHEDULER:
        code: 0x0008
        description: "The task scheduler reported an error while running the query"
      ERROR_QUERY_NOT_IMPLEMENTED:
        code: 0x0009
        description: "The requested feature or operation is not implemented"
      ERROR_QUERY_PARAMETER_NOT_RESOLVED:
        code: 0x000A
        description: "A prepared-statement parameter has not been bound to a value"
      ERROR_QUERY_PARAMETER_NOT_ALLOWED:
        code: 0x000B
        description: "A prepared-statement parameter was used in a position where it is not allowed"
  Database:
    group_id: 0x0006
    description: "Errors related to catalog, transactions, and persistent state"
    entries:
      ERROR_DATABASE_CATALOG:
        code: 0x0001
        description: "A catalog operation failed (e.g. object not found or already exists)"
      ERROR_DATABASE_TRANSACTION:
        code: 0x0002
        description: "A transaction-level error occurred (e.g. conflict or aborted transaction)"
      ERROR_DATABASE_CONSTRAINT:
        code: 0x0003
        description: "A constraint (primary key, unique, foreign key, NOT NULL, check) was violated"
      ERROR_DATABASE_INDEX:
        code: 0x0004
        description: "An index operation failed"
      ERROR_DATABASE_SEQUENCE:
        code: 0x0005
        description: "A sequence operation failed (e.g. overflow or invalid usage)"
      ERROR_DATABASE_STATISTICS:
        code: 0x0006
        description: "An error related to catalog statistics occurred"
      ERROR_DATABASE_SERIALIZATION:
        code: 0x0007
        description: "Serializing or deserializing a database object failed"
  Configuration:
    group_id: 0x0007
    description: "Errors related to settings, configuration, and permissions"
    entries:
      ERROR_CONFIGURATION_SETTINGS:
        code: 0x0001
        description: "A settings-related error occurred (e.g. setting an unknown option)"
      ERROR_CONFIGURATION_INVALID:
        code: 0x0002
        description: "The database configuration is invalid"
      ERROR_CONFIGURATION_PERMISSION:
        code: 0x0003
        description: "The operation is not permitted under the current configuration"
  Runtime:
    group_id: 0x0008
    description: "Internal, fatal, and interrupt-level runtime errors"
    entries:
      ERROR_RUNTIME_INTERNAL:
        code: 0x0001
        description: "An internal invariant was violated; this indicates a bug in DuckDB"
      ERROR_RUNTIME_FATAL:
        code: 0x0002
        description: "A fatal error occurred; the database is no longer usable"
      ERROR_RUNTIME_INTERRUPT:
        code: 0x0003
        description: "The operation was interrupted (e.g. by a cancel request)"
      ERROR_RUNTIME_NULL_POINTER:
        code: 0x0004
        description: "A required pointer was unexpectedly null"
constants:
  API_ERROR:
    value: "0xFFFFFFFF"
    description: "Sentinel for an unspecified internal API error"
