# yaml-language-server: $schema=https://raw.githubusercontent.com/duckdblabs/capiv2/main/src/capigen/schema/module.schema.json
module: error_management

functions:
  duckdb_v2_error_create:
    added: "1.4.0"
    deprecated: "1.5.0"
    role: constructor        # <--- GENERATOR: Create a 'new Error()'
    belongs_to: duckdb_v2_error # <--- GENERATOR: Class association
    summary: "Allocates a new error object."
    parameters:
      out_err:
        type: "duckdb_v2_error"
        indirection: 1
        kind: OUT
        description: "The pointer to receive the newly created error instance."
    return_type: "duckdb_v2_error_code"
    # cleanup_with: duckdb_v2_error_destroy
    description: |
      This function initializes a new error instance and returns it through the `out_err` parameter.

  duckdb_v2_error_get_text:
    role: getter             # <--- GENERATOR: Error::get_text() or Error::text property
    belongs_to: duckdb_v2_error
    summary: "Retrieves the descriptive error message."
    parameters:
      err:
        type: "duckdb_v2_error"
        description: "The error instance to query."
      out_text:
        type: "char"
        indirection: 2
        const: false
        kind: OUT
        description: "The pointer to receive the error message string."
    return_type: "duckdb_v2_error_code"

  duckdb_v2_error_set_text:
    role: setter             # <--- GENERATOR: Error::set_text(val)
    belongs_to: duckdb_v2_error
    summary: "Updates the descriptive message."
    parameters:
      err:
          type: "duckdb_v2_error"
          description: "The error instance to update."
      text:
        type: "char"
        indirection: 1
        const: false
        description: "The new error message string."
    return_type: "duckdb_v2_error_code"

  duckdb_v2_error_destroy:
    role: destructor         # <--- GENERATOR: Put this in the C++ ~Error()
    belongs_to: duckdb_v2_error
    summary: "Frees the error object."
    parameters:
      err:
        type: "duckdb_v2_error"
        description: "The error instance to free."
    return_type: "duckdb_v2_error_code"
