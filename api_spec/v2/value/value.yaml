  duckdb_v2_value_get_bit:
    summary: Borrows the raw bit-string bytes of a BIT value.
    description: |
      Includes the leading padding byte and the trailing data bytes — the
      same on-disk encoding accepted by duckdb_v2_value_create_bit.
    role: getter
    belongs_to: duckdb_v2_value
    parameters:
      value:
        type: duckdb_v2_value
      out_data:
        type: u8
        indirection: 2
        const: true
        kind: OUT_BORROW
      out_length:
        type: idx
        indirection: 1
        kind: OUT
      err:
        type: duckdb_v2_error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via duckdb_v2_error_info_destroy.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_value_get_bignum:
    summary: Returns the magnitude bytes and sign flag of a BIGNUM value.
    description: |
      Returns the decoded big-endian magnitude bytes (no VARINT header)
      and the sign flag. Caller reconstructs the integer as
      (-1)**is_negative * unsigned_big_endian(out_data[0..out_length]).

      The magnitude buffer is caller-owned and must be freed with free().
      Allocation is required even for positive bignums (and unavoidable
      for negative ones, where core stores the magnitude bit-inverted) —
      the buffer is a fresh malloc'd copy in both cases.
    role: getter
    belongs_to: duckdb_v2_value
    parameters:
      value:
        type: duckdb_v2_value
      out_data:
        type: u8
        indirection: 2
        kind: OUT
        description: Receives a malloc'd buffer of magnitude bytes. Caller frees.
      out_length:
        type: idx
        indirection: 1
        kind: OUT
        description: Receives the length of the magnitude buffer in bytes.
      out_is_negative:
        type: bool
        indirection: 1
        kind: OUT
        description: Receives true if the value is negative, false otherwise.
      err:
        type: duckdb_v2_error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via duckdb_v2_error_info_destroy.
    return_type: DUCKDB_V2_API_CALL
