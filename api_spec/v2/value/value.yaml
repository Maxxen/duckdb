# yaml-language-server: $schema=https://raw.githubusercontent.com/duckdblabs/capiv2/main/src/capigen/schema/module.schema.json
module: value
functions:
  duckdb_v2_destroy_value:
    summary: "Destroys the value and de-allocates all memory."
    role: destructor
    belongs_to: duckdb_v2_value
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      value:
        type: duckdb_v2_value
        indirection: 1
        description: "The value to destroy."
    return_type: DUCKDB_V2_API_CALL
