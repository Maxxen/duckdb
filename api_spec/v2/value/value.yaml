  duckdb_v2_value_get_varchar:
    summary: Borrows the bytes of a VARCHAR value.
    description: |
      Returns a borrowed pointer + length. The data is valid until the
      value is destroyed; the pointer is not null-terminated by contract
      (use out_length).
    role: getter
    belongs_to: duckdb_v2_value
    parameters:
      value:
        type: duckdb_v2_value
      out_data:
        type: char
        indirection: 2
        const: true
        kind: OUT_BORROW
      out_length:
        type: idx
        indirection: 1
        kind: OUT
      err:
        type: duckdb_v2_error_info
        indirection: 1
        kind: OUT
        description: Optional. On failure, receives an opaque info handle the caller must destroy via duckdb_v2_error_info_destroy.
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_value_get_blob:
    summary: Borrows the bytes of a BLOB value.
    role: getter
