# yaml-language-server: $schema=https://raw.githubusercontent.com/duckdblabs/capiv2/main/src/capigen/schema/module.schema.json
module: vector
functions:
  duckdb_v2_vector_get_data:
    summary: "Retrieves the data pointer of the vector."
    role: getter
    belongs_to: duckdb_v2_vector
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      vector:
        type: duckdb_v2_vector
        description: "The vector to get the data from."
      out_data:
        type: opaque
        indirection: 2
        kind: OUT
        description: "The data pointer."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_vector_get_validity:
    summary: "Retrieves the validity mask pointer of the vector."
    role: getter
    belongs_to: duckdb_v2_vector
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      vector:
        type: duckdb_v2_vector
        description: "The vector to get the data from."
      out_validity:
        type: u64
        indirection: 2
        kind: OUT
        description: "The pointer to the validity mask, or NULL if no validity mask is present."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_validity_row_is_valid:
    summary: "Returns whether or not a row is valid in the given validity mask."
    role: getter
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      validity:
        type: u64
        indirection: 1
        description: "The validity mask, as obtained through duckdb_v2_vector_get_validity."
      row:
        type: idx
        description: "The row index."
      out_valid:
        type: bool
        indirection: 1
        kind: OUT
        description: "True if the row is valid, false otherwise."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_list_vector_get_child:
    summary: "Retrieves the child vector of a list vector."
    role: getter
    belongs_to: duckdb_v2_vector
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      vector:
        type: duckdb_v2_vector
        description: "The list vector."
      out_child:
        type: duckdb_v2_vector
        indirection: 1
        kind: OUT
        description: "The child vector."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_struct_vector_get_child:
    summary: "Retrieves the child vector of a struct vector."
    role: getter
    belongs_to: duckdb_v2_vector
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      vector:
        type: duckdb_v2_vector
        description: "The struct vector."
      index:
        type: idx
        description: "The child index."
      out_child:
        type: duckdb_v2_vector
        indirection: 1
        kind: OUT
        description: "The child vector."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_array_vector_get_child:
    summary: "Retrieves the child vector of an array vector."
    role: getter
    belongs_to: duckdb_v2_vector
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      vector:
        type: duckdb_v2_vector
        description: "The array vector."
      out_child:
        type: duckdb_v2_vector
        indirection: 1
        kind: OUT
        description: "The child vector."
    return_type: DUCKDB_V2_API_CALL
  duckdb_v2_string_is_inlined:
    summary: "Whether or not the duckdb_v2_string_t value is inlined."
    role: getter
    parameters:
      context:
        type: duckdb_v2_ctx
        description: "The context handle."
      string:
        type: duckdb_v2_string_t
        description: "The string value."
      out_inlined:
        type: bool
        indirection: 1
        kind: OUT
        description: "True if the string is inlined."
    return_type: DUCKDB_V2_API_CALL
